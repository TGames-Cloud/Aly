<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia</title>
    <link rel="stylesheet" href="Paginas/estilos.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-bar">
        <div class="widget dinero-widget" onclick="ui.togglePresupuesto()">
            <span class="icon">💰</span>
            <div id="popover-dinero" class="popover">
                <p>Presupuesto hoy:</p>
                <span id="monto-dinero" class="resaltado">--</span>
            </div>
        </div>

        <div class="widget musica-widget" onclick="ui.toggleMusica()">
            <span class="icon">🎵</span>
            <div id="popover-musica" class="popover" onclick="event.stopPropagation()">
                <div id="player"></div>
                <div class="reproductor-layout">
                    <p id="track-titulo" class="musica-nombre">Esperando...</p>
                    <div class="controles-musica">
                        <button onclick="musica.prev()">⏮</button>
                        <button onclick="musica.playPause()">⏯</button>
                        <button onclick="musica.next()">⏭</button>
                    </div>
                    <input type="range" min="0" max="100" value="50" class="slider-vol" oninput="musica.setVolumen(this.value)">
                </div>
            </div>
        </div>
    </header>

    <main class="contenedor-principal" id="vista-inicio">
        <h1>Nuestra Historia</h1>
        <div class="contador-card" id="contador-display"></div>
        <div class="grid-carpetas" id="menu-carpetas"></div>
    </main>

    <main class="contenedor-principal" id="vista-carpeta" style="display: none;">
        <button class="btn-accion" onclick="ui.irAlInicio()">← Volver</button>
        <h2 id="titulo-seccion-actual"></h2>
        <div class="grid-cartas" id="contenedor-cartas"></div>
    </main>

    <div id="overlay-lectura">
        <div class="carta-fisica">
            <span class="cerrar-btn" onclick="ui.cerrarCarta()">✕</span>
            <h2 id="lectura-titulo"></h2>
            <div class="lectura-cuerpo" id="lectura-texto"></div>
            <button class="btn-leido" onclick="ui.cerrarCarta()">MARCAR COMO LEÍDO</button>
        </div>
    </div>

    <script src="Sistema/almacen.js?v=2"></script>
    <script src="https://www.youtube.com/iframe_api" async></script>

<script>
    // Esta función es el estándar de oro. 
    // YouTube la busca globalmente. No la metas dentro de otros archivos.
    function onYouTubeIframeAPIReady() {
        console.log("YouTube respondió correctamente");
        // Aquí llamas a la función de tu archivo musica.js
        if(typeof inicializarReproductor === 'function') {
            inicializarReproductor();
        }
    }
</script>
    <script src="Sistema/musica.js?v=2"></script>
    <script src="Paginas/visual.js?v=2"></script>
</body>
</html>
