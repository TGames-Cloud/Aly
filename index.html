<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia</title>
    <link rel="stylesheet" href="Paginas/estilos.css">
</head>
<body>

    <header class="top-bar">
        <div class="widget" onclick="ui.togglePresupuesto()">
            <span class="icon">💰</span>
            <div id="popover-dinero" class="popover">
                <p>Presupuesto para hoy:</p>
                <span id="monto-dinero">Cargando...</span>
            </div>
        </div>

        <div class="widget" onclick="ui.toggleMusica()">
            <span class="icon">🎵</span>
            <div id="popover-musica" class="popover" onclick="event.stopPropagation()">
                <div id="player"></div> <div class="controles-musica">
                    <button onclick="musica.prev()">⏮</button>
                    <button onclick="musica.playPause()">⏯</button>
                    <button onclick="musica.next()">⏭</button>
                </div>
                <input type="range" min="0" max="100" value="50" oninput="musica.setVolumen(this.value)">
                <p id="track-titulo">Selecciona una canción</p>
            </div>
        </div>
    </header>

    <main class="contenedor-principal" id="vista-inicio">
        <h1>Nuestra Historia</h1>
        <div class="contador-card" id="contador-display"></div>
        <div class="grid-carpetas" id="menu-carpetas"></div>
    </main>

    <main class="contenedor-principal" id="vista-carpeta" style="display: none;">
        <button class="btn-accion" onclick="ui.irAlInicio()">← Volver al Menú</button>
        <h2 id="titulo-seccion-actual"></h2>
        <div class="grid-cartas" id="contenedor-cartas"></div>
    </main>

    <div id="overlay-lectura">
        <div class="carta-fisica">
            <span class="cerrar-btn" onclick="ui.cerrarCarta()">✕</span>
            <h2 id="lectura-titulo"></h2>
            <div class="lectura-cuerpo" id="lectura-texto" onscroll="ui.checkScroll(this)"></div>
            <button id="btn-marcar-leido" class="btn-leido" onclick="ui.cerrarCarta()">MARCAR COMO LEÍDO</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="Sistema/almacen.js"></script>
    <script src="Sistema/musica.js"></script>
    <script src="Paginas/visual.js"></script>
</body>
</html>
